      --glass-bg: rgba(255,255,255,.10);

      --radius: 16px;
      --blur: 14px;
    }

    html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }

    video { width:100vw; height:100vh; object-fit:cover; display:block; background:#000; }

    #ui {

      display:flex; justify-content:center;
      padding: 0 18px 18px;
      z-index: 10;
      pointer-events:none;
    }

    .panel {
      pointer-events:auto;
      width:min(980px, calc(100vw - 36px));
      display:flex;
      gap: 12px;
      align-items:center;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 28px rgba(255,255,255,.10), 0 0 16px rgba(255,255,255,.08);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
    }

    .panel .left { flex: 1; min-width: 0; }

    input[type="text"]{
      width:100%;
      box-sizing:border-box;
      color: var(--text);
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: calc(var(--radius) - 6px);
      padding: 12px 12px;
      font: 500 16px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,.45); }
    input[type="text"]:focus{
      border-color: rgba(160,200,255,.65);
      box-shadow: 0 0 0 3px rgba(160,200,255,.18), 0 0 26px rgba(255,255,255,.10);
    }

    .actions { display:flex; gap: 10px; align-items:center; }

    button {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.10);
      color: var(--text);
      border-radius: calc(var(--radius) - 6px);

      cursor:pointer;

      background: rgba(255,255,255,.14);

    }

      display:flex; align-items:center; justify-content:center;

  function pad2(n){ return String(n).padStart(2,'0'); }
  function mainFile(n){ return `Video${pad2(n)}.mp4`; }

    function pickRandomWithoutImmediateRepeat(arr){
  if (!arr || arr.length === 0) return null;

  // Alles außer dem zuletzt gespielten
  const filtered = arr.filter(x => x !== lastProbabilisticSpecial);

  // Wenn alles gefiltert wurde (z. B. nur 1 Element), fallback auf original
  const pool = filtered.length ? filtered : arr;

  const chosen = pool[Math.floor(Math.random() * pool.length)];

  lastProbabilisticSpecial = chosen;
  return chosen;
}

}

  function normalizeForMatch(raw){
    const lower = (raw || '').toLowerCase();
    const normalized = lower
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');

    const keepQuestion = normalized.replace(/[.,!?;:()"'“”„”]/g, ' ');
    return keepQuestion.replace(/\s+/g, ' ').trim();
  }

  function escapeRegex(str){
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function includesAnyKeyword(text, keywords){
  const normalizedText = normalizeForMatch(text);

  return (keywords || []).some(k => {
    const normalizedKeyword = normalizeForMatch(k);
    if (!normalizedKeyword) return false;

    // Match nur als eigenständiges Wort / eigenständige Wortfolge
    const pattern = new RegExp(`(^|\\s)${escapeRegex(normalizedKeyword)}(?=\\s|$)`, 'i');
    return pattern.test(normalizedText);
  });
}

  function includesAnyPhraseStrict(text, phrases){
  const normalizedText = normalizeForMatch(text);

  return (phrases || []).some(p => {
    const normalizedPhrase = normalizeForMatch(p);
    if (!normalizedPhrase) return false;

    const pattern = new RegExp(`(^|\\s)${escapeRegex(normalizedPhrase)}(?=\\s|$)`, 'i');
    return pattern.test(normalizedText);
  });
}

  function tokenCount(text){
    if (!text) return 0;
    return text.split(/\s+/).filter(Boolean).length;
  }

  function includesAnyExactOrContained(text, list){
    return (list || []).some(item => {
      const n = normalizeForMatch(item);
      return n && text.includes(n);
    });
  }

  function startsWithAny(text, starters){
    return (starters || []).some(item => {
      const n = normalizeForMatch(item);
      return n && text.startsWith(n);
    });
  }

  function isRepeatRequest(rawInput){
    const normalized = normalizeForMatch(rawInput);
    return includesAnyExactOrContained(normalized, REPEAT_PHRASES);
  }
    function isPriorityTrigger(id){
  return ['A01', 'A04', 'A11', 'A13'].includes(id);
}

  function isMonosyllabicStyleInput(rawInput){
    const normalized = normalizeForMatch(rawInput);
    if (!normalized) return false;

    // Ausnahmen
    if (includesAnyKeyword(normalized, ['nein', 'nope', 'nee'])) return false;
    if (includesAnyKeyword(normalized, ['lol', 'haha', 'hahaha'])) return false;

    const tokens = normalized.split(/\s+/).filter(Boolean);
    if (tokens.length !== 1) return false;

    const word = tokens[0];
    return word.length <= 3;
  }

  function isGibberishInput(rawInput){
    const normalized = normalizeForMatch(rawInput);
    if (!normalized) return false;

    const tokens = normalized.split(/\s+/).filter(Boolean);
    if (tokens.length !== 1) return false;

    const word = tokens[0];

    if (!/^[a-zA-Zäöüß]+$/.test(word)) return false;
    if (word.length < 6) return false;

    const vowelMatches = word.match(/[aeiouyäöü]/gi) || [];
    return vowelMatches.length <= 1;
  }

  function isA10Question(rawInput){
    const normalized = normalizeForMatch(rawInput);
    const hasQuestionMark = (rawInput || '').includes('?');
    if (!hasQuestionMark) return false;
    return startsWithAny(normalized, ['wie', 'was', 'wer', 'wann']);
  }

  function isA13CanYou(rawInput){
  const normalized = normalizeForMatch(rawInput);
  const hasQuestionMark = (rawInput || '').includes('?');

  return normalized.startsWith('kannst du') ||
         (hasQuestionMark && includesAnyPhraseStrict(normalized, ['kannst du']));
}

  function currentLinearChance(early, late){
    const clamped = Math.max(MAIN_MIN, Math.min(TRIGGERS_ACTIVE_UNTIL_MAIN, mainIndex));
    const span = Math.max(1, TRIGGERS_ACTIVE_UNTIL_MAIN - MAIN_MIN);
    const progress = (clamped - MAIN_MIN) / span;
    return early + (late - early) * progress;
  }

  function canFireAnyTrigger(){
    if (triggerHistory.length === 0) return true;
    const lastAnyTriggerAt = triggerHistory[triggerHistory.length - 1];
    return (inputCount - lastAnyTriggerAt) > ANY_TRIGGER_GAP_STEPS;
  }

  function canFireTriggerId(id){
    const last = triggerLastFiredAt[id];
    if (last == null) return true;
    return (inputCount - last) > TRIGGER_COOLDOWN_STEPS;
  }

  function registerTriggerFire(id){
    triggerHistory.push(inputCount);
    triggerLastFiredAt[id] = inputCount;
  }

  function canFireTimed(lastFiredAt, cooldown){
    if (lastFiredAt == null) return true;
    return (inputCount - lastFiredAt) > cooldown;
  }

  function pickRandom(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function replayLastNarrativeVideo(){
    if (!lastNarrativePlayback) return;

    if (lastNarrativePlayback.type === 'main') {
      playMain(lastNarrativePlayback.value);
      return;
    }

    if (lastNarrativePlayback.type === 'special') {
      playSpecial(lastNarrativePlayback.value);
    }
  }

  function matchTrigger(rawInput){
  const normalized = normalizeForMatch(rawInput);
  const hasQuestionMark = (rawInput || '').includes('?');

  for (const rule of TRIGGERS){
    if (!canFireTriggerId(rule.id)) continue;

    if (rule.type === 'whyQuestion'){
      const whyHit = includesAnyKeyword(normalized, rule.words);
      if (whyHit && (!rule.requiresQuestionMark || hasQuestionMark)) return rule.id;
    }

    if (rule.type === 'keywords'){
      if (includesAnyKeyword(normalized, rule.keywords)) return rule.id;
    }

    if (rule.type === 'phrases'){
      if (includesAnyPhraseStrict(normalized, rule.phrases)) return rule.id;
    }

    if (rule.type === 'phrasesOrKeywords'){
      if (includesAnyPhraseStrict(normalized, rule.phrases)) return rule.id;
      if (includesAnyKeyword(normalized, rule.keywords)) return rule.id;
    }
  }
  return null;
}

  async function tryPlayMedia(){
    video.muted = !audioEnabled;
    video.volume = VIDEO_VOLUME;

    bgm.volume = BGM_VOLUME;
    bgm.muted = !audioEnabled;

    const vp = video.play();
    const ap = bgm.play();
    await Promise.allSettled([vp, ap]);
  }

  function loadVideoSrc(src, {loop=false, onEnded=null, useFallback=true} = {}){
  clearDelayedPopupTimer();
  clearVideoEndFallback();

  video.pause();
  video.onended = null;
  video.onloadedmetadata = null;
  video.loop = !!loop;
  video.playsInline = true;

  const wrappedOnEnded = () => {
    clearVideoEndFallback();
    if (onEnded) onEnded();
  };

  if (onEnded) {
    video.onended = wrappedOnEnded;
  }

  video.src = src;
  video.load();

  video.onloadedmetadata = () => {
    if (
      useFallback &&
      !loop &&
      onEnded &&
      Number.isFinite(video.duration) &&
      video.duration > 0
    ) {
      videoEndFallbackTimer = setTimeout(() => {
        console.log('Fallback-Übergang für:', src);
        wrappedOnEnded();
      }, Math.max(0, video.duration * 1000 + 1500));
    }
  };

  tryPlayMedia();
}

function playMain(n){
  mainIndex = n;
  lastNarrativePlayback = { type: 'main', value: n };

  if (n === 26 || n === 27 || n === 28 || n === 29) {
    hideInputPanel();
  } else {
    showInputPanel();
  }

  // Sonderfall: Video 27 soll nach dem ersten Durchlauf selbst loopen
  if (n === 27) {
    clearDelayedPopupTimer();
    clearVideoEndFallback();

    video.pause();
    video.onended = null;
    video.onloadedmetadata = null;
    video.loop = false;
    video.playsInline = true;
    video.src = mainFile(27);
    video.load();

    video.onended = () => {
      showBackToStartOnly();
      loadVideoSrc(mainFile(27), {
        loop: true,
        useFallback: false
      });
    };

    tryPlayMedia();
    return;
  }

  let onEnded = () => {
    playIdleLoop();
  };

  if (n === 26) {
    onEnded = () => {
      playIdleLoop();
      inPremiumFlow = true;
      hideInputPanel();
      showPremiumPopup();
    };
  } else if (n === 28) {
    onEnded = () => {
      playIdleLoop();
      showConfirmEndPopup();
    };
  } else if (n === 29) {
    onEnded = () => {
      playIdleLoop();
      showBackToStartOnly();
    };
  }

  loadVideoSrc(mainFile(n), {
    loop: false,
    onEnded,
    useFallback: n !== 28
  });

  if (n === 1) {
    resetConversationStates();
  }
}

  function playSpecial(id){
    const src = SPECIAL_VIDEOS[id];
    if (!src) return;

    lastNarrativePlayback = { type: 'special', value: id };

    loadVideoSrc(src, {
      loop: false,
      onEnded: () => {
        playIdleLoop();
      }
    });
  }
    function playIdleLoop(){
  loadVideoSrc(IDLE_VIDEO, {
    loop: true,
    onEnded: null
  });
}

  /********************************************************************
   * Popup system
   ********************************************************************/
  function showCenterButton(text, onClick){
    centerButton.textContent = text;
    centerButton.onclick = onClick;
    centerButtonOverlay.classList.add('show');
    centerButtonOverlay.setAttribute('aria-hidden', 'false');
    hideInputPanel();

    setTimeout(() => {
      centerButton.focus();
    }, 0);
  }

  function closeCenterButton(){
    centerButtonOverlay.classList.remove('show');
    centerButtonOverlay.setAttribute('aria-hidden', 'true');
    centerButton.onclick = null;
  }

  function isBlockingOverlayOpen(){
    return popupOverlay.classList.contains('show') ||
           centerButtonOverlay.classList.contains('show') ||
           startOverlay.style.display !== 'none';
  }

  function openPopup({title, text, actions=[]}){
    hideInputPanel();

    popupTitle.textContent = title ?? 'Hinweis';
    popupText.textContent = text ?? '';
    popupActions.innerHTML = '';

    actions.forEach(a => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = a.text;
      b.addEventListener('click', a.onClick);
      popupActions.appendChild(b);
    });

    popupOverlay.classList.add('show');
    popupOverlay.setAttribute('aria-hidden', 'false');

    setTimeout(() => {
      const firstBtn = popupActions.querySelector('button');
      if (firstBtn) firstBtn.focus();
    }, 0);
  }

  function closePopup(){
    popupOverlay.classList.remove('show');
    popupOverlay.setAttribute('aria-hidden', 'true');
    popupActions.innerHTML = '';
    showInputPanel();

    if (inputPanel.style.display !== 'none') {
      setTimeout(() => input.focus(), 0);
    }
  }

  const POPUP_CHANCE = 0.28; // ca. jede 3–4 Eingaben im Schnitt
const POPUP_MIN_INPUTS = 2; // nicht direkt am Anfang

function maybeShowNthPopup(){
  if (inputCount < POPUP_MIN_INPUTS) return;

  if (Math.random() > POPUP_CHANCE) return;

  const p = POPUP_LIBRARY[popupCursor % POPUP_LIBRARY.length];
  popupCursor++;

  if (p.kind === 'one'){
    openPopup({
      title: p.title,
      text: p.text,
      actions: [
        {
          text: p.okText || 'OK',
          onClick: () => {
            closePopup();
            if (p.action === 'GO_TO_27') {
              playMain(27);
            }
          }
        }
      ]
    });
  }

  if (p.kind === 'two'){
    openPopup({
      title: p.title,
      text: p.text,
      actions: [
        {
          text: p.okText || 'OK',
          onClick: () => {
            closePopup();
            if (p.action === 'GO_TO_27') {
              playMain(27);
            }
          }
        },
        {
          text: p.cancelText || 'Abbrechen',
          onClick: () => {
            closePopup();
          }
        }
      ]
    });
  }
}

  /********************************************************************
   * Premium / end flow UI
   ********************************************************************/
  function hideInputPanel(){
    inputPanel.style.display = 'none';
  }

  function showInputPanel(){
    inputPanel.style.display = '';
  }

  function showPremiumPopup(){
    openPopup({
      title: PREMIUM_POPUP.title,
      text: PREMIUM_POPUP.text,
      actions: [
        { text: PREMIUM_POPUP.buyText, onClick: () => { closePopup(); playMain(27); } },
        { text: PREMIUM_POPUP.noText, onClick: () => { closePopup(); playMain(28); } },
      ]
    });
  }

  function showConfirmEndPopup(){
    openPopup({
      title: CONFIRM_END_POPUP.title,
      text: CONFIRM_END_POPUP.text,
      actions: [
        { text: CONFIRM_END_POPUP.buyText, onClick: () => { closePopup(); playMain(27); } },
        { text: CONFIRM_END_POPUP.endText, onClick: () => { closePopup(); playMain(29); } },
      ]
    });
  }

  function showBackToStartOnly(){
    showCenterButton(BACK_TO_START_BUTTON_TEXT, () => {
      closeCenterButton();
      playMain(1);
    });
  }

  function resetConversationStates(){
    inPremiumFlow = false;
    pendingMainIndex = null;
    ignoreTriggersOnce = false;
    inputCount = 0;
    popupCursor = 0;
    triggerHistory = [];
    triggerLastFiredAt = {};
    fallbackLastFiredAt = null;
    confrontLastFiredAt = null;
    redirectLastFiredAt = null;
    lastProbabilisticSpecial = null;
    lastNarrativePlayback = { type: 'main', value: MAIN_MIN };
    showInputPanel();
  }

  /********************************************************************
   * Main advance logic
   ********************************************************************/
  function advance(){
  if (inPremiumFlow) return;
  if (isBlockingOverlayOpen()) return;

  const raw = input.value || '';
  const trimmed = raw.trim();
  const normalized = normalizeForMatch(raw);

  if (REQUIRE_NONEMPTY_INPUT && trimmed.length === 0) {
    input.focus();
    return;
  }

  inputCount++;
  INPUT_LOG.push({ mainBefore: mainIndex, text: trimmed, ts: new Date() });
  input.value = '';

  // Wiederholen: letztes Main-/Special-Video erneut abspielen
  if (isRepeatRequest(raw)) {
    replayLastNarrativeVideo();
    return;
  }

  // Wenn ein Special abgespielt wurde, dann beim nächsten Submit zurück in den Main-Flow
  if (pendingMainIndex !== null) {
    const nextMain = pendingMainIndex;
    pendingMainIndex = null;
    ignoreTriggersOnce = false;
    playMain(nextMain);
    maybeShowNthPopup();
    return;
  }

  const triggersInRange =
  mainIndex >= 1 &&
  mainIndex <= TRIGGERS_ACTIVE_UNTIL_MAIN;
  const generalTriggerAllowed =
    (!ignoreTriggersOnce) &&
    triggersInRange &&
    canFireAnyTrigger();

  const priorityTriggerAllowed =
    (!ignoreTriggersOnce) &&
    triggersInRange;

  const nextMain = (mainIndex < MAIN_MAX) ? (mainIndex + 1) : MAIN_MIN;

  // 1) Sonderfälle mit eigener Logik

  // A13 = klarer direkter Trigger -> nicht vom globalen Gap blockieren
  if (
    priorityTriggerAllowed &&
    isA13CanYou(raw) &&
    canFireTriggerId('A13')
  ) {
    registerTriggerFire('A13');
    pendingMainIndex = nextMain;
    ignoreTriggersOnce = true;
    playSpecial('A13');
    maybeShowNthPopup();
    return;
  }

  // Diese bleiben bewusst am globalen Gap, damit keine Schleifen entstehen
  if (generalTriggerAllowed) {
    if (isGibberishInput(raw) && canFireTriggerId('A15')) {
      registerTriggerFire('A15');
      pendingMainIndex = nextMain;
      ignoreTriggersOnce = true;
      playSpecial('A15');
      maybeShowNthPopup();
      return;
    }

    if (isMonosyllabicStyleInput(raw) && canFireTriggerId('A14')) {
      registerTriggerFire('A14');
      pendingMainIndex = nextMain;
      ignoreTriggersOnce = true;
      playSpecial('A14');
      maybeShowNthPopup();
      return;
    }

    if (isA10Question(raw) && canFireTriggerId('A10')) {
      registerTriggerFire('A10');
      pendingMainIndex = nextMain;
      ignoreTriggersOnce = true;
      playSpecial('A10');
      maybeShowNthPopup();
      return;
    }
  }

  // 2) Direkte Trigger aus TRIGGERS
  if (!ignoreTriggersOnce && triggersInRange) {
    const match = matchTrigger(raw);

    if (match && SPECIAL_VIDEOS[match]) {
      const allowed = isPriorityTrigger(match)
        ? canFireTriggerId(match)
        : (canFireAnyTrigger() && canFireTriggerId(match));

      if (allowed) {
        registerTriggerFire(match);
        pendingMainIndex = nextMain;
        ignoreTriggersOnce = true;
        playSpecial(match);
        maybeShowNthPopup();
        return;
      }
    }
  }

  // 3) Probabilistische Fallbacks / Konfrontation / Redirect
  // ab Main 2, damit der Einstieg nicht sofort schief kippt
  const probabilisticAllowed =
    normalized.length > 6 &&
    tokenCount(normalized) >= 2 &&
    mainIndex >= 2 &&
    mainIndex <= TRIGGERS_ACTIVE_UNTIL_MAIN &&
    canFireAnyTrigger();

  if (probabilisticAllowed) {
    const fallbackChance = currentLinearChance(FALLBACK_CHANCE_EARLY, FALLBACK_CHANCE_LATE);
    const confrontChance = currentLinearChance(CONFRONT_CHANCE_EARLY, CONFRONT_CHANCE_LATE);
    const redirectChance = currentLinearChance(REDIRECT_CHANCE_EARLY, REDIRECT_CHANCE_LATE);

    if (canFireTimed(fallbackLastFiredAt, FALLBACK_COOLDOWN_STEPS) && Math.random() < fallbackChance) {
      fallbackLastFiredAt = inputCount;
      triggerHistory.push(inputCount);

      pendingMainIndex = nextMain;
      ignoreTriggersOnce = true;

      const chosen = pickRandomWithoutImmediateRepeat(['A20', 'A21']);
      playSpecial(chosen);
      maybeShowNthPopup();
      return;
    }

    if (canFireTimed(confrontLastFiredAt, CONFRONT_COOLDOWN_STEPS) && Math.random() < confrontChance) {
      confrontLastFiredAt = inputCount;
      triggerHistory.push(inputCount);

      pendingMainIndex = nextMain;
      ignoreTriggersOnce = true;

      const chosen = pickRandomWithoutImmediateRepeat(['A22', 'A23']);
      playSpecial(chosen);
      maybeShowNthPopup();
      return;
    }

    if (canFireTimed(redirectLastFiredAt, REDIRECT_COOLDOWN_STEPS) && Math.random() < redirectChance) {
      redirectLastFiredAt = inputCount;
      triggerHistory.push(inputCount);

      pendingMainIndex = nextMain;
      ignoreTriggersOnce = true;

      const chosen = pickRandomWithoutImmediateRepeat(['A24', 'A25']);
      playSpecial(chosen);
      maybeShowNthPopup();
      return;
    }
  }

  // 4) Default: normales nächstes Main-Video
  playMain(nextMain);
  maybeShowNthPopup();
}

  /********************************************************************
   * Audio toggling + start overlay
   ********************************************************************/
  function setAudioEnabled(on){
    audioEnabled = !!on;
    muteBtn.textContent = audioEnabled ? 'Ton aus' : 'Ton an';
    tryPlayMedia();
  }

  muteBtn.addEventListener('click', () => setAudioEnabled(!audioEnabled));
  submitBtn.addEventListener('click', advance);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      advance();
    }
  });

  startBtn.addEventListener('click', () => {
    setAudioEnabled(true);
    startOverlay.style.display = 'none';
    playMain(MAIN_MIN);
    input.focus();
  });

  /********************************************************************
   * Boot
   ********************************************************************/
  setAudioEnabled(false);
</script>
