<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interaktive Video-Installation</title>
  <style>
    :root{
      --glass-bg: rgba(255,255,255,.10);
      --glass-border: rgba(255,255,255,.25);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --radius: 16px;
      --blur: 14px;
    }

    html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
    #stage { position:fixed; inset:0; background:#000; }
    video { width:100vw; height:100vh; object-fit:cover; display:block; background:#000; }

    #ui {
      position:fixed; left:0; right:0; bottom:0;
      display:flex; justify-content:center;
      padding: 0 18px 18px;
      z-index: 10;
      pointer-events:none;
    }

    .panel {
      pointer-events:auto;
      width:min(980px, calc(100vw - 36px));
      display:flex;
      gap: 12px;
      align-items:center;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 28px rgba(255,255,255,.10), 0 0 16px rgba(255,255,255,.08);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
    }

    .panel .left { flex: 1; min-width: 0; }

    input[type="text"]{
      width:100%;
      box-sizing:border-box;
      color: var(--text);
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: calc(var(--radius) - 6px);
      padding: 12px 12px;
      font: 500 16px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,.45); }
    input[type="text"]:focus{
      border-color: rgba(160,200,255,.65);
      box-shadow: 0 0 0 3px rgba(160,200,255,.18), 0 0 26px rgba(255,255,255,.10);
    }

    .actions { display:flex; gap: 10px; align-items:center; }

    button {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.10);
      color: var(--text);
      border-radius: calc(var(--radius) - 6px);
      padding: 12px 14px;
      cursor:pointer;
      font: 600 14px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: .02em;
      box-shadow: 0 0 24px rgba(255,255,255,.08);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      user-select:none;
      white-space:nowrap;
    }
    button:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
      box-shadow: 0 0 32px rgba(255,255,255,.12);
    }

    #startOverlay{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index: 30;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #startBtn{
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.10);
      color: var(--text);
      border-radius: var(--radius);
      padding: 18px 28px;
      cursor: pointer;
      font: 700 18px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      box-shadow: 0 0 40px rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    #startBtn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
      box-shadow: 0 0 48px rgba(255,255,255,.14);
    }

    #centerButtonOverlay{
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 35;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

#centerButtonOverlay.show{
  display: flex;
}

#centerButton{
  border: 1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  color: var(--text);
  border-radius: var(--radius);
  padding: 18px 28px;
  cursor: pointer;
  font: 700 18px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  box-shadow: 0 0 40px rgba(255,255,255,.10);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
}

#centerButton:hover{
  transform: translateY(-1px);
  background: rgba(255,255,255,.14);
  box-shadow: 0 0 48px rgba(255,255,255,.14);
}

    #popupOverlay{
      position:fixed; inset:0;
      display:none;
      align-items:center; justify-content:center;
      z-index: 40;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 18px;
    }
    #popupOverlay.show{ display:flex; }

    #popup{
      width:min(760px, calc(100vw - 36px));
      border-radius: var(--radius);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: 0 0 46px rgba(255,255,255,.12);
      color: var(--text);
      padding: 16px;
      transform: scale(.98);
      opacity: 0;
      transition: transform 160ms ease, opacity 160ms ease;
    }
    #popupOverlay.show #popup{ transform: scale(1); opacity: 1; }

    #popupHeader{
      display:flex; align-items:center; justify-content:space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    #popupTitle{
      font: 700 16px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing:.02em;
    }
    #popupText{
      font: 500 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: rgba(255,255,255,.86);
      white-space: pre-wrap;
      margin: 0;
    }
    #popupActions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 14px; }
    #popupActions button{ padding: 10px 12px; }

    @media (max-width: 520px){
      .panel{ flex-direction:column; align-items:stretch; }
      .actions{ justify-content:space-between; }
      #popupActions{ justify-content:stretch; flex-direction:column; }
    }
  </style>
</head>

<body>
  <div id="stage">
    <video id="videoPlayer" playsinline></video>
  </div>

  <audio id="bgm" src="Hintergrundmusik.mp3" loop></audio>

  <div id="ui">
    <div class="panel" id="inputPanel" role="region" aria-label="Interaktion">
      <div class="left">
        <input id="userInput" type="text" placeholder="Tippe hier … und drücke Enter" autocomplete="off" />
      </div>
      <div class="actions">
        <button id="submitBtn" type="button">Absenden</button>
        <button id="muteBtn" type="button">Ton an</button>
      </div>
    </div>
  </div>

  <div id="startOverlay">
    <button id="startBtn" type="button">Start</button>
  </div>

  <div id="centerButtonOverlay" aria-hidden="true">
  <button id="centerButton" type="button">Zurück zum Anfang</button>
</div>

  <div id="popupOverlay" aria-hidden="true">
    <div id="popup" role="dialog" aria-modal="true" aria-label="Pop-up">
      <div id="popupHeader">
        <div id="popupTitle">Hinweis</div>
      </div>
      <p id="popupText"></p>
      <div id="popupActions"></div>
    </div>
  </div>

  <script>
    /********************************************************************
     * EDITABLE SETTINGS
     ********************************************************************/
    const MAIN_MIN = 1;
    const MAIN_MAX = 29;

    const SPECIAL_VIDEOS = {
      A01: 'A01.mp4', // Beleidigung / Abwertung
      A02: 'A02.mp4', // Warum-Fragen
      A03: 'A03.mp4', // Daten / Meta / Betreiber
      A04: 'A04.mp4', // Echtheit / Realität
      A05: 'A05.mp4', // Popup-/Premium-Glitch, nicht textgetriggert
    };

    const IDLE_VIDEO = 'IdleNeutral.mp4';

    const BGM_VOLUME = 0.35;
    const VIDEO_VOLUME = 1.0;
    const REQUIRE_NONEMPTY_INPUT = false;
    const POPUP_EVERY_N = 3;
    const END_POPUP_DELAY = 5000;
    const TRIGGERS_ACTIVE_UNTIL_MAIN = 26;
    const PREMIUM_GATE_AFTER_MAIN = 26;

    const TRIGGER_COOLDOWN_STEPS = 5; // pro Trigger-ID
    const ANY_TRIGGER_GAP_STEPS = 2;  // global zwischen beliebigen Triggern

    /********************************************************************
     * TRIGGERS
     ********************************************************************/
    const TRIGGERS = [
      {
        id: 'A02',
        type: 'whyQuestion',
        words: ['warum', 'wieso', 'weshalb', 'woher', 'wirklich'],
        requiresQuestionMark: true,
      },
      {
        id: 'A03',
        type: 'phrasesOrKeywords',
        phrases: [
          'sammelst du daten',
          'wer hat dich erstellt',
          'wer steckt hinter dir',
          'wie heißt du wirklich',
          'womit verdienst du geld',
          'liest du mit',
          'hörst du mit'
        ],
        keywords: [
          'daten',
          'algorithmus',
          'meta',
          'facebook',
          'trainingsdaten'
        ],
      },
      {
        id: 'A01',
        type: 'phrases',
        phrases: [
          'du bist dumm',
          'bist du dumm',
          'du bist hässlich',
          'du nervst',
          'du bist peinlich',
          'du bist blöd',
          'ich hasse dich',
          'ich hasse mich',
          'du bist nervig',
          'halt die klappe',
          'verpiss dich',
          'geh weg',
          'nerv nicht'
        ],
      },
      {
        id: 'A04',
        type: 'phrases',
        phrases: [
          'du bist nicht echt',
          'du bist nicht real',
          'du bist kein mensch',
          'du bist unecht',
          'du bist fake',
          'das ist fake',
          'du wirkst fake',
          'du wirkst nicht echt',
          'bist du echt',
          'bist du real',
          'bist du ein mensch',
          'bist du künstlich',
          'du bist nur eine ki',
          'du bist nur ein programm',
          'du bist nur ein computer'
        ],
      },
    ];

    /********************************************************************
     * POPUPS
     ********************************************************************/
    const POPUP_LIBRARY = [
  { kind: 'one', title: 'Error 404', text: 'Emotionen konnten nicht geladen werden.', okText: 'Ok' },

  {
    kind: 'two',
    title: 'Mehr Authentizität?',
    text: 'Kaufe jetzt Premium, um echte Gefühle freizuschalten',
    okText: 'Jetzt kaufen',
    cancelText: 'Nein, danke',
    action: 'GO_TO_27',
  },

  { kind: 'one', title: 'System', text: 'Gefühlsstatus: instabil.\nFortfahren?', okText: 'Fortfahren' },

  {
    kind: 'two',
    title: 'Error 404',
    text: 'Emotionen konnten nicht geladen werden.',
    okText: 'Jetzt Premium kaufen',
    cancelText: 'Nein, Danke',
    action: 'GO_TO_27',
  },
];

    /********************************************************************
     * Premium / End Flow texts
     ********************************************************************/
    const PREMIUM_POPUP = {
      title: 'Premium',
      text: 'Jetzt Premium kaufen?',
      buyText: 'Jetzt Premium kaufen',
      noText: 'Nein, Danke',
    };

    const CONFIRM_END_POPUP = {
      title: 'Bist du sicher?',
      text: 'Möchtest du Premium kaufen oder die Unterhaltung beenden?',
      buyText: 'Premium kaufen',
      endText: 'Unterhaltung beenden',
    };

    const BACK_TO_START_BUTTON_TEXT = 'Zurück zum Anfang';

    /********************************************************************
     * OPTIONAL: store visitor inputs
     ********************************************************************/
    const INPUT_LOG = [];

    /********************************************************************
     * Elements
     ********************************************************************/
    const video = document.getElementById('videoPlayer');
    const bgm = document.getElementById('bgm');

    const inputPanel = document.getElementById('inputPanel');
    const input = document.getElementById('userInput');
    const submitBtn = document.getElementById('submitBtn');
    const muteBtn = document.getElementById('muteBtn');

    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');

    const centerButtonOverlay = document.getElementById('centerButtonOverlay');
    const centerButton = document.getElementById('centerButton');

    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupText = document.getElementById('popupText');
    const popupActions = document.getElementById('popupActions');

    /********************************************************************
     * State
     ********************************************************************/
    let mainIndex = MAIN_MIN;
    let audioEnabled = false;
    let inputCount = 0;
    let popupCursor = 0;
    let pendingMainIndex = null;
    let ignoreTriggersOnce = false;
    let inPremiumFlow = false;
    let delayedPopupTimer = null;

    // Cooldown / Trigger history
    let triggerHistory = [];
    let triggerLastFiredAt = {};

    /********************************************************************
     * Helpers
     ********************************************************************/
    function pad2(n){ return String(n).padStart(2,'0'); }
    function mainFile(n){ return `Video${pad2(n)}.mp4`; }

    function clearDelayedPopupTimer(){
      if (delayedPopupTimer) {
        clearTimeout(delayedPopupTimer);
        delayedPopupTimer = null;
      }
    }

    function normalizeForMatch(raw){
      const lower = (raw || '').toLowerCase();
      const normalized = lower
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');

      const keepQuestion = normalized.replace(/[.,!;:()"'“”„”]/g, ' ');
      return keepQuestion.replace(/\s+/g, ' ').trim();
    }

    function includesAnyKeyword(text, keywords){
      return (keywords || []).some(k => {
        if (!k) return false;
        return text.includes(normalizeForMatch(k));
      });
    }

    function includesAnyPhrase(text, phrases){
      return (phrases || []).some(p => {
        if (!p) return false;
        return text.includes(normalizeForMatch(p));
      });
    }

    function canFireAnyTrigger(){
      if (triggerHistory.length === 0) return true;
      const lastAnyTriggerAt = triggerHistory[triggerHistory.length - 1];
      return (inputCount - lastAnyTriggerAt) > ANY_TRIGGER_GAP_STEPS;
    }

    function canFireTriggerId(id){
      const last = triggerLastFiredAt[id];
      if (last == null) return true;
      return (inputCount - last) > TRIGGER_COOLDOWN_STEPS;
    }

    function registerTriggerFire(id){
      triggerHistory.push(inputCount);
      triggerLastFiredAt[id] = inputCount;
    }

    function matchTrigger(rawInput){
      const normalized = normalizeForMatch(rawInput);
      const hasQuestionMark = (rawInput || '').includes('?');

      for (const rule of TRIGGERS){
        if (!canFireTriggerId(rule.id)) continue;

        if (rule.type === 'whyQuestion'){
          const whyHit = includesAnyKeyword(normalized, rule.words);
          if (whyHit && (!rule.requiresQuestionMark || hasQuestionMark)) return rule.id;
        }

        if (rule.type === 'keywords'){
          if (includesAnyKeyword(normalized, rule.keywords)) return rule.id;
        }

        if (rule.type === 'phrases'){
          if (includesAnyPhrase(normalized, rule.phrases)) return rule.id;
        }

        if (rule.type === 'phrasesOrKeywords'){
          if (includesAnyPhrase(normalized, rule.phrases)) return rule.id;
          if (includesAnyKeyword(normalized, rule.keywords)) return rule.id;
        }
      }
      return null;
    }

    /********************************************************************
     * Media playback
     ********************************************************************/
    async function tryPlayMedia(){
      video.muted = !audioEnabled;
      video.volume = VIDEO_VOLUME;

      bgm.volume = BGM_VOLUME;
      bgm.muted = !audioEnabled;

      const vp = video.play();
      const ap = bgm.play();
      await Promise.allSettled([vp, ap]);
    }

    function loadVideoSrc(src, {loop=false, onEnded=null} = {}){
      clearDelayedPopupTimer();

      video.pause();
      video.onended = null;
      video.removeAttribute('src');
      video.load();

      video.src = src;
      video.loop = !!loop;
      video.playsInline = true;

      if (onEnded) video.onended = onEnded;

      tryPlayMedia();
    }

    function playIdleLoop(){
      loadVideoSrc(IDLE_VIDEO, { loop: true });
    }

    function playMain(n){
  mainIndex = n;

  let onEnded = () => {
    playIdleLoop();
  };

  if (n === 27) {
    onEnded = () => {
      playIdleLoop();
      showBackToStartOnly();
    };
  } else if (n === 28) {
    onEnded = () => {
      playIdleLoop();
      delayedPopupTimer = setTimeout(() => {
        showConfirmEndPopup();
      }, END_POPUP_DELAY);
    };
  }

  loadVideoSrc(mainFile(n), {
    loop: false,
    onEnded
  });

  if (n === 1) {
    resetConversationStates();
  }
}

    function playSpecial(id){
      const src = SPECIAL_VIDEOS[id];
      if (!src) return;

      loadVideoSrc(src, {
        loop: false,
        onEnded: () => {
          playIdleLoop();
        }
      });
    }

    /********************************************************************
     * Popup system
     ********************************************************************/
    function showCenterButton(text, onClick){
  centerButton.textContent = text;
  centerButton.onclick = onClick;
  centerButtonOverlay.classList.add('show');
  centerButtonOverlay.setAttribute('aria-hidden', 'false');
  hideInputPanel();

  setTimeout(() => {
    centerButton.focus();
  }, 0);
}

function closeCenterButton(){
  centerButtonOverlay.classList.remove('show');
  centerButtonOverlay.setAttribute('aria-hidden', 'true');
  centerButton.onclick = null;
}

function isBlockingOverlayOpen(){
  return popupOverlay.classList.contains('show') ||
         centerButtonOverlay.classList.contains('show') ||
         startOverlay.style.display !== 'none';
}
    
    
   function openPopup({title, text, actions=[]}){
  hideInputPanel();

  popupTitle.textContent = title ?? 'Hinweis';
  popupText.textContent = text ?? '';
  popupActions.innerHTML = '';

      actions.forEach(a => {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = a.text;
        b.addEventListener('click', a.onClick);
        popupActions.appendChild(b);
      });

      popupOverlay.classList.add('show');
      popupOverlay.setAttribute('aria-hidden', 'false');

      setTimeout(() => {
        const firstBtn = popupActions.querySelector('button');
        if (firstBtn) firstBtn.focus();
      }, 0);
    }

    function closePopup(){
      popupOverlay.classList.remove('show');
      popupOverlay.setAttribute('aria-hidden', 'true');
      popupActions.innerHTML = '';
      showInputPanel();
      if (inputPanel.style.display !== 'none') {
        setTimeout(() => input.focus(), 0);
      }
    }

    function maybeShowNthPopup(){
  if (POPUP_EVERY_N <= 0) return;
  if (inputCount <= 0) return;
  if (inputCount % POPUP_EVERY_N !== 0) return;

  const p = POPUP_LIBRARY[popupCursor % POPUP_LIBRARY.length];
  popupCursor++;

  if (p.kind === 'one'){
    openPopup({
      title: p.title,
      text: p.text,
      actions: [
        {
          text: p.okText || 'OK',
          onClick: () => {
            closePopup();

            if (p.action === 'GO_TO_27') {
              playMain(27);
            }
          }
        }
      ]
    });
  }

  if (p.kind === 'two'){
    openPopup({
      title: p.title,
      text: p.text,
      actions: [
        {
          text: p.okText || 'OK',
          onClick: () => {
            closePopup();

            if (p.action === 'GO_TO_27') {
              playMain(27);
            }
          }
        },
        {
          text: p.cancelText || 'Abbrechen',
          onClick: () => {
            closePopup();
          }
        }
      ]
    });
  }
}

    /********************************************************************
     * Premium / end flow UI
     ********************************************************************/
    function hideInputPanel(){
      inputPanel.style.display = 'none';
    }

    function showInputPanel(){
      inputPanel.style.display = '';
    }

    function showPremiumPopup(){
      openPopup({
        title: PREMIUM_POPUP.title,
        text: PREMIUM_POPUP.text,
        actions: [
          { text: PREMIUM_POPUP.buyText, onClick: () => { closePopup(); playMain(27); } },
          { text: PREMIUM_POPUP.noText, onClick: () => { closePopup(); playMain(28); } },
        ]
      });
    }

    function showConfirmEndPopup(){
      openPopup({
        title: CONFIRM_END_POPUP.title,
        text: CONFIRM_END_POPUP.text,
        actions: [
          { text: CONFIRM_END_POPUP.buyText, onClick: () => { closePopup(); playMain(27); } },
          { text: CONFIRM_END_POPUP.endText, onClick: () => { closePopup(); playMain(1); } },
        ]
      });
    }

    function showBackToStartOnly(){
  showCenterButton(BACK_TO_START_BUTTON_TEXT, () => {
    closeCenterButton();
    playMain(1);
  });
}

    function resetConversationStates(){
      inPremiumFlow = false;
      pendingMainIndex = null;
      ignoreTriggersOnce = false;
      inputCount = 0;
      popupCursor = 0;
      triggerHistory = [];
      triggerLastFiredAt = {};
      showInputPanel();
    }

    /********************************************************************
     * Main advance logic
     ********************************************************************/
   function advance(){
  if (inPremiumFlow) return;
  if (isBlockingOverlayOpen()) return;

      const raw = input.value || '';
      const trimmed = raw.trim();

      if (REQUIRE_NONEMPTY_INPUT && trimmed.length === 0) {
        input.focus();
        return;
      }

      inputCount++;
      INPUT_LOG.push({ mainBefore: mainIndex, text: trimmed, ts: new Date() });
      input.value = '';

      if (mainIndex === PREMIUM_GATE_AFTER_MAIN) {
        inPremiumFlow = true;
        hideInputPanel();
        showPremiumPopup();
        return;
      }

      if (pendingMainIndex !== null) {
        const nextMain = pendingMainIndex;
        pendingMainIndex = null;
        ignoreTriggersOnce = false;
        playMain(nextMain);
        maybeShowNthPopup();
        return;
      }

      const triggersAllowed =
        (!ignoreTriggersOnce) &&
        (mainIndex <= TRIGGERS_ACTIVE_UNTIL_MAIN) &&
        canFireAnyTrigger();

      if (triggersAllowed) {
        const match = matchTrigger(raw);

        if (match && SPECIAL_VIDEOS[match]) {
          registerTriggerFire(match);

          const nextMain = (mainIndex < MAIN_MAX) ? (mainIndex + 1) : MAIN_MIN;
          pendingMainIndex = nextMain;
          ignoreTriggersOnce = true;
          playSpecial(match);
          maybeShowNthPopup();
          return;
        }
      }

      const next = (mainIndex < MAIN_MAX) ? (mainIndex + 1) : MAIN_MIN;
      playMain(next);
      maybeShowNthPopup();
    }

    /********************************************************************
     * Audio toggling + start overlay
     ********************************************************************/
    function setAudioEnabled(on){
      audioEnabled = !!on;
      muteBtn.textContent = audioEnabled ? 'Ton aus' : 'Ton an';
      tryPlayMedia();
    }

    muteBtn.addEventListener('click', () => setAudioEnabled(!audioEnabled));
submitBtn.addEventListener('click', advance);

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    advance();
  }
});

startBtn.addEventListener('click', () => {
  setAudioEnabled(true);
  startOverlay.style.display = 'none';
  playMain(MAIN_MIN);
  input.focus();
});

/********************************************************************
 * Boot
 ********************************************************************/
setAudioEnabled(false);
